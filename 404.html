        .card {

        }

        }

        .hobbies-title {
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .hobbies-text {
            font-weight: 700;
            font-size: 1.1rem;
            color: #b0b0b0;
            margin: 0;
        }

        .icons-container {
            display: flex;
            gap: 24px;
            opacity: 0.5;
            border-top: 1px solid #444;
            padding-top: 24px;
        }

        .icon-link svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
